apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: reconx-prod
spec:
  replicas: 1 # For HA, this would be a Redis StatefulSet with Sentinel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: 2Gi
          limits:
            memory: 4Gi
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {} # Use PersistentVolumeClaim for production
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: reconx-prod
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
  type: ClusterIP
