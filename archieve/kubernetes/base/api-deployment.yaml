apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconx-api-gateway
  namespace: reconx-prod
  labels:
    app: reconx
    component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: reconx
      component: api-gateway
  template:
    metadata:
      labels:
        app: reconx
        component: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: reconx/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: reconx-db-secrets
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: reconx-prod
spec:
  selector:
    app: reconx
    component: api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
