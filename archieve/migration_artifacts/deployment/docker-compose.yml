version: '3.8'\n\nservices:\n  api:\n    build: ../api\n    ports:\n      - '8000:8000'\n    depends_on:\n      - redis\n      - postgres\n      - neo4j\n\n  worker:\n    build: ../distributed\n    depends_on:\n      - redis\n\n  redis:\n    image: redis:alpine\n    ports:\n      - '6379:6379'\n\n  postgres:\n    image: postgres:13\n    environment:\n      POSTGRES_PASSWORD: reconx\n    ports:\n      - '5432:5432'\n\n  neo4j:\n    image: neo4j:latest\n    environment:\n      NEO4J_AUTH: neo4j/reconx\n    ports:\n      - '7474:7474'\n      - '7687:7687'\n\n  dashboard:\n    build: ../dashboard/frontend\n    ports:\n      - '3000:3000'